<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kesenian Barengan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --green: #1db954;
      --green-dim: #17a349;
      --text: #e8e8e8;
      --muted: #888;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
    }

    header {
      width: 100%;
      max-width: 780px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--green);
    }

    #login-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      border-radius: var(--radius);
      padding: 14px 18px;
      width: 100%;
      max-width: 780px;
      margin-bottom: 22px;
      font-size: 0.9rem;
      display: none;
    }

    #login-banner a {
      color: var(--green);
      font-weight: 600;
      text-decoration: none;
    }

    /* Now Playing */
    #now-playing {
      width: 100%;
      max-width: 780px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 22px;
      display: flex;
      gap: 18px;
      align-items: center;
    }

    #np-art {
      width: 80px;
      height: 80px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }

    #np-art.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--muted);
    }

    .np-info { flex: 1; min-width: 0; }

    .np-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--green);
      font-weight: 600;
      margin-bottom: 4px;
    }

    #np-name {
      font-size: 1.1rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #np-artist {
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .progress-wrap {
      margin-top: 10px;
      background: var(--border);
      border-radius: 999px;
      height: 3px;
      overflow: hidden;
    }

    #np-progress {
      height: 100%;
      background: var(--green);
      border-radius: 999px;
      width: 0%;
      transition: width 1s linear;
    }

    .np-times {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .paused-badge {
      font-size: 0.7rem;
      color: var(--muted);
      margin-left: 8px;
    }

    /* Search */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      font-weight: 600;
    }

    #results-toggle {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      cursor: pointer;
      display: none;
      transition: border-color 0.15s, color 0.15s;
    }

    #results-toggle:hover { border-color: #555; color: var(--text); }

    #search-results.collapsed { display: none; }

    #search-section {
      width: 100%;
      max-width: 780px;
      margin-bottom: 22px;
    }

    #search-wrap {
      display: flex;
      gap: 8px;
    }

    #search-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1rem;
      padding: 12px 16px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s;
    }

    #search-input:focus { border-color: var(--green); }

    #search-btn {
      background: var(--green);
      color: #000;
      border: none;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 12px 20px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #search-btn:hover { background: var(--green-dim); }
    #search-btn:disabled { opacity: 0.5; cursor: default; }

    #search-results {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .track-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      transition: border-color 0.15s, background 0.15s;
    }

    .track-row:hover { border-color: #444; background: var(--surface2); }

    .track-row img {
      width: 46px;
      height: 46px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .track-meta { flex: 1; min-width: 0; }

    .track-name {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-sub {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .track-dur {
      font-size: 0.75rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .add-btn {
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .add-btn:hover { background: var(--green); color: #000; }
    .add-btn:disabled { opacity: 0.4; cursor: default; }
    .add-btn.adding { opacity: 0.6; }
    .add-btn.added { background: var(--green); color: #000; border-color: var(--green); }

    /* Queue */
    #queue-section {
      width: 100%;
      max-width: 780px;
    }

    #queue-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .queue-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
    }

    .queue-num {
      font-size: 0.78rem;
      color: var(--muted);
      width: 20px;
      text-align: right;
      flex-shrink: 0;
    }

    .queue-row img {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .remove-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1;
      padding: 4px 6px;
      cursor: pointer;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
    }

    .remove-btn:hover { color: #e44; background: rgba(238,68,68,0.1); }

    #queue-empty {
      color: var(--muted);
      font-size: 0.88rem;
      padding: 16px 0;
    }

    /* Chat */
    #chat-section {
      width: 100%;
      max-width: 780px;
      margin-top: 22px;
    }

    #chat-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }

    #chat-you {
      font-size: 0.75rem;
      color: var(--muted);
    }

    #chat-you strong { color: var(--green); }

    #chat-change-nick {
      font-size: 0.7rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }

    #chat-change-nick:hover { color: var(--text); }

    #chat-messages {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 8px;
      scroll-behavior: smooth;
    }

    .chat-msg {
      display: flex;
      gap: 8px;
      align-items: baseline;
      font-size: 0.875rem;
      line-height: 1.4;
    }

    .chat-nick {
      font-weight: 700;
      color: var(--green);
      flex-shrink: 0;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat-nick.is-me { color: #7eb8f7; }

    .chat-text { flex: 1; word-break: break-word; }

    .chat-time {
      font-size: 0.68rem;
      color: var(--muted);
      flex-shrink: 0;
      margin-left: auto;
    }

    #chat-input-wrap {
      display: flex;
      gap: 8px;
    }

    #chat-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.95rem;
      padding: 10px 14px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s;
    }

    #chat-input:focus { border-color: var(--green); }
    #chat-input:disabled { opacity: 0.4; }

    #chat-send-btn {
      background: var(--green);
      color: #000;
      border: none;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 10px 18px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #chat-send-btn:hover { background: var(--green-dim); }
    #chat-send-btn:disabled { opacity: 0.5; cursor: default; }

    /* Nickname modal */
    #nickname-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #nickname-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      width: min(340px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #nickname-box h2 {
      font-size: 1.1rem;
      font-weight: 700;
    }

    #nickname-box p {
      font-size: 0.85rem;
      color: var(--muted);
    }

    #nickname-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1rem;
      padding: 10px 14px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s;
    }

    #nickname-input:focus { border-color: var(--green); }

    #nickname-confirm {
      background: var(--green);
      color: #000;
      border: none;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 11px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
    }

    #nickname-confirm:hover { background: var(--green-dim); }

    /* Toasts */
    #toast-area {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 999;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 0.85rem;
      max-width: 320px;
      animation: slide-in 0.2s ease;
    }

    .toast.error { border-left: 3px solid #e44; }
    .toast.success { border-left: 3px solid var(--green); }

    @keyframes slide-in {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>

<header>
  <h1>Kesenian Barengan</h1>
  <span id="header-status" style="font-size:0.8rem;color:var(--muted)">connecting…</span>
</header>

<div id="login-banner">
  <strong>Host setup:</strong> <a href="/login">Connect Spotify</a> to enable search and playback.
</div>

<!-- Now Playing -->
<section id="now-playing">
  <div id="np-art" class="placeholder">♪</div>
  <div class="np-info">
    <div class="np-label">Now Playing</div>
    <div id="np-name" style="color:var(--muted)">Nothing playing</div>
    <div id="np-artist"></div>
    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div id="np-progress"></div>
    </div>
    <div class="np-times" id="np-times" style="display:none">
      <span id="np-elapsed">0:00</span>
      <span id="np-duration">0:00</span>
    </div>
  </div>
</section>

<!-- Search -->
<section id="search-section">
  <div class="section-header">
    <div class="section-title">Search &amp; Add</div>
    <button id="results-toggle">Show</button>
  </div>
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Search for a track…" autocomplete="off" />
    <button id="search-btn">Search</button>
  </div>
  <div id="search-results"></div>
</section>

<!-- Queue -->
<section id="queue-section">
  <div class="section-title">Up Next</div>
  <div id="queue-list">
    <div id="queue-empty" style="color:var(--muted);font-size:.88rem;padding:16px 0">Queue is empty — search for something!</div>
  </div>
</section>

<!-- Chat -->
<section id="chat-section">
  <div id="chat-header">
    <div class="section-title">Chat</div>
    <span id="chat-you"></span>
    <button id="chat-change-nick">change</button>
  </div>
  <div id="chat-messages"></div>
  <div id="chat-input-wrap">
    <input id="chat-input" type="text" placeholder="Message…" maxlength="300" autocomplete="off" disabled />
    <button id="chat-send-btn" disabled>Send</button>
  </div>
</section>

<!-- Nickname modal -->
<div id="nickname-modal" style="display:none">
  <div id="nickname-box">
    <h2>Who are you?</h2>
    <p>Pick a name to join the chat. It's saved in your browser.</p>
    <input id="nickname-input" type="text" placeholder="Your name…" maxlength="30" autocomplete="off" />
    <button id="nickname-confirm">Join chat</button>
  </div>
</div>

<div id="toast-area"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function () {
  'use strict';

  // ── Socket ──────────────────────────────────────────────────────────────────
  const socket = io();
  let authenticated = false;

  const myClientId = (() => {
    let id = localStorage.getItem('jukebox_client_id');
    if (!id) {
      // crypto.randomUUID() requires secure context; fallback for plain-HTTP LAN access
      id = (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function')
        ? crypto.randomUUID()
        : Date.now().toString(36) + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
      localStorage.setItem('jukebox_client_id', id);
    }
    return id;
  })();

  socket.on('auth:status', ({ authenticated: a }) => {
    authenticated = a;
    document.getElementById('login-banner').style.display = a ? 'none' : 'block';
    document.getElementById('header-status').textContent = a ? 'Spotify connected' : 'No Spotify auth';
    document.getElementById('header-status').style.color = a ? 'var(--green)' : 'var(--muted)';
    document.getElementById('search-btn').disabled = !a;
    document.getElementById('search-input').disabled = !a;
  });

  socket.on('nowPlaying:update', renderNowPlaying);
  socket.on('queue:update', renderQueue);
  socket.on('jukebox:stopped', () => toast('Queue ended — Spotify paused. Add a song to keep going.', 'error'));

  // ── Progress animation ──────────────────────────────────────────────────────
  let progressTick = null;
  let npSnapshot = null; // { progress_ms, polledAt, duration_ms, is_playing }

  function startProgressTick() {
    if (progressTick) clearInterval(progressTick);
    progressTick = setInterval(() => {
      if (!npSnapshot?.is_playing) return;
      const elapsed = npSnapshot.progress_ms + (Date.now() - npSnapshot.polledAt);
      const pct = Math.min(100, (elapsed / npSnapshot.duration_ms) * 100);
      document.getElementById('np-progress').style.width = pct + '%';
      document.getElementById('np-elapsed').textContent = fmtMs(elapsed);
    }, 1000);
  }

  function renderNowPlaying(np) {
    const artEl    = document.getElementById('np-art');
    const nameEl   = document.getElementById('np-name');
    const artistEl = document.getElementById('np-artist');
    const progWrap = document.getElementById('progress-wrap');
    const timesEl  = document.getElementById('np-times');
    const progBar  = document.getElementById('np-progress');
    const durEl    = document.getElementById('np-duration');
    const elapEl   = document.getElementById('np-elapsed');

    if (!np) {
      artEl.className = 'placeholder';
      artEl.textContent = '♪';
      nameEl.textContent = 'Nothing playing';
      nameEl.style.color = 'var(--muted)';
      artistEl.textContent = '';
      progWrap.style.display = 'none';
      timesEl.style.display  = 'none';
      npSnapshot = null;
      return;
    }

    // Art
    if (np.image) {
      artEl.className = '';
      if (artEl.tagName !== 'IMG') {
        const img = document.createElement('img');
        img.id = 'np-art';
        img.alt = '';
        artEl.replaceWith(img);
      }
      document.getElementById('np-art').src = np.image;
    }

    nameEl.textContent   = np.name;
    nameEl.style.color   = '';
    artistEl.textContent = np.artist + (np.is_playing ? '' : ' ⏸');
    durEl.textContent    = fmtMs(np.duration_ms);
    elapEl.textContent   = fmtMs(np.progress_ms);

    const pct = Math.min(100, (np.progress_ms / np.duration_ms) * 100);
    progBar.style.transition = 'none';
    progBar.style.width = pct + '%';
    // re-enable smooth transition after a frame
    requestAnimationFrame(() => { progBar.style.transition = 'width 1s linear'; });

    progWrap.style.display = '';
    timesEl.style.display  = '';

    npSnapshot = { progress_ms: np.progress_ms, polledAt: np.polledAt ?? Date.now(), duration_ms: np.duration_ms, is_playing: np.is_playing };
    startProgressTick();
  }

  // ── Queue rendering ─────────────────────────────────────────────────────────
  function renderQueue(q) {
    const list  = document.getElementById('queue-list');
    const empty = document.getElementById('queue-empty');
    list.querySelectorAll('.queue-row').forEach((el) => el.remove());

    if (!q || q.length === 0) {
      empty.style.display = '';
      return;
    }

    empty.style.display = 'none';
    q.forEach((t, i) => {
      const row = document.createElement('div');
      row.className = 'queue-row';
      row.innerHTML = `
        <span class="queue-num">${i + 1}</span>
        <img src="${t.image ?? ''}" alt="" onerror="this.style.visibility='hidden'"/>
        <div class="track-meta">
          <div class="track-name">${esc(t.name)}</div>
          <div class="track-sub">${esc(t.artist)} — ${esc(t.album)}</div>
        </div>
        <span class="track-dur">${fmtMs(t.duration_ms)}</span>
        ${t.clientId === myClientId ? `<button class="remove-btn" title="Remove">✕</button>` : ''}
      `;
      if (t.clientId === myClientId) {
        row.querySelector('.remove-btn').addEventListener('click', () => removeFromQueue(t.uri, t.clientId));
      }
      list.appendChild(row);
    });
  }

  // ── Search ──────────────────────────────────────────────────────────────────
  let searchDebounce = null;

  document.getElementById('search-btn').addEventListener('click', doSearch);
  document.getElementById('search-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doSearch();
  });

  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;

    const btn = document.getElementById('search-btn');
    btn.disabled = true;
    btn.textContent = '…';

    try {
      const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error ?? 'Search failed');
      renderResults(data);
    } catch (err) {
      toast(err.message, 'error');
    } finally {
      btn.disabled = !authenticated;
      btn.textContent = 'Search';
    }
  }

  const toggleBtn = document.getElementById('results-toggle');
  toggleBtn.addEventListener('click', () => {
    document.getElementById('search-results').classList.toggle('collapsed');
  });

  function renderResults(tracks) {
    const container = document.getElementById('search-results');
    container.innerHTML = '';
    container.classList.add('collapsed'); // auto-collapse after each search
    toggleBtn.style.display = 'block';

    if (!tracks.length) {
      container.innerHTML = '<div style="color:var(--muted);font-size:.85rem;padding:12px 0">No results</div>';
      return;
    }

    tracks.forEach((t) => {
      const row = document.createElement('div');
      row.className = 'track-row';
      row.innerHTML = `
        <img src="${t.image ?? ''}" alt="" onerror="this.style.visibility='hidden'"/>
        <div class="track-meta">
          <div class="track-name">${esc(t.name)}</div>
          <div class="track-sub">${esc(t.artist)} — ${esc(t.album)}</div>
        </div>
        <span class="track-dur">${fmtMs(t.duration_ms)}</span>
        <button class="add-btn" data-uri="${t.uri}">+ Add</button>
      `;
      row.querySelector('.add-btn').addEventListener('click', () => addToQueue(t, row));
      container.appendChild(row);
    });
  }

  async function addToQueue(track, row) {
    const btn = row.querySelector('.add-btn');
    btn.disabled = true;
    btn.textContent = '…';
    btn.classList.add('adding');

    try {
      const res = await fetch('/api/queue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...track, clientId: myClientId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error ?? 'Failed to add');

      btn.textContent = 'Added!';
      btn.classList.remove('adding');
      btn.classList.add('added');
      toast(`"${track.name}" added to queue`, 'success');

      setTimeout(() => {
        btn.textContent = '+ Add';
        btn.classList.remove('added');
        btn.disabled = false;
      }, 3000);
    } catch (err) {
      btn.textContent = '+ Add';
      btn.classList.remove('adding');
      btn.disabled = false;
      toast(err.message, 'error');
    }
  }

  async function removeFromQueue(uri, clientId) {
    try {
      const res = await fetch('/api/queue', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uri, clientId }),
      });
      if (!res.ok) {
        const data = await res.json();
        toast(data.error ?? 'Failed to remove', 'error');
      }
    } catch {
      toast('Failed to remove', 'error');
    }
  }

  // ── Toast ───────────────────────────────────────────────────────────────────
  function toast(msg, type = 'success') {
    const area = document.getElementById('toast-area');
    const el   = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    area.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function fmtMs(ms) {
    if (!ms) return '0:00';
    const s = Math.floor(ms / 1000);
    return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
  }

  function esc(str) {
    return (str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Chat ────────────────────────────────────────────────────────────────────
  let myNickname = localStorage.getItem('jukebox_nickname') || null;

  function openNicknameModal() {
    const modal = document.getElementById('nickname-modal');
    const input = document.getElementById('nickname-input');
    modal.style.display = 'flex';
    input.value = myNickname ?? '';
    setTimeout(() => input.focus(), 50);
  }

  function applyNickname(name) {
    myNickname = name;
    localStorage.setItem('jukebox_nickname', name);
    document.getElementById('nickname-modal').style.display = 'none';
    document.getElementById('chat-you').innerHTML = `chatting as <strong>${esc(name)}</strong>`;
    document.getElementById('chat-input').disabled = false;
    document.getElementById('chat-send-btn').disabled = false;
    document.getElementById('chat-input').focus();
  }

  document.getElementById('nickname-confirm').addEventListener('click', () => {
    const val = document.getElementById('nickname-input').value.trim();
    if (!val) return;
    applyNickname(val);
  });

  document.getElementById('nickname-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('nickname-confirm').click();
  });

  document.getElementById('chat-change-nick').addEventListener('click', openNicknameModal);

  if (myNickname) {
    applyNickname(myNickname);
  } else {
    openNicknameModal();
  }

  function fmtTime(ts) {
    const d = new Date(ts);
    return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
  }

  function appendChatMessage({ nickname, text, ts }) {
    const list = document.getElementById('chat-messages');
    const el = document.createElement('div');
    el.className = 'chat-msg';
    const isMe = nickname === myNickname;
    el.innerHTML = `
      <span class="chat-nick${isMe ? ' is-me' : ''}">${esc(nickname)}</span>
      <span class="chat-text">${esc(text)}</span>
      <span class="chat-time">${fmtTime(ts)}</span>
    `;
    list.appendChild(el);
    list.scrollTop = list.scrollHeight;
  }

  socket.on('chat:history', (msgs) => msgs.forEach(appendChatMessage));
  socket.on('chat:message', appendChatMessage);

  function sendChatMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || !myNickname) return;
    socket.emit('chat:send', { nickname: myNickname, text });
    input.value = '';
  }

  document.getElementById('chat-send-btn').addEventListener('click', sendChatMessage);
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendChatMessage();
  });
})();
</script>
</body>
</html>
